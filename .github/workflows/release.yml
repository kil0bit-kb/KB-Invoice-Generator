name: Manual Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'New Version (e.g. 1.0.0)'
        required: true
        default: '1.0.0'

jobs:
  publish:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'windows-latest'
          - platform: 'macos-latest'
          - platform: 'ubuntu-22.04'

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies (Linux only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Install JS dependencies
        run: npm install

      - name: Update Version
        shell: pwsh
        run: |
          $version = "${{ github.event.inputs.version }}"
          
          # Update package.json
          $pkgFile = "package.json"
          $pkg = Get-Content $pkgFile | ConvertFrom-Json
          $pkg.version = $version
          $pkg | ConvertTo-Json -Depth 10 | Set-Content $pkgFile
          
          # Update tauri.conf.json
          $tauriFile = "src-tauri/tauri.conf.json"
          $tauri = Get-Content $tauriFile | ConvertFrom-Json
          $tauri.version = $version
          $tauri | ConvertTo-Json -Depth 10 | Set-Content $tauriFile
          
          Write-Host "Set version to $version in package.json and tauri.conf.json"

      - name: Build & Publish
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        with:
          tagName: v${{ github.event.inputs.version }}
          releaseName: 'v${{ github.event.inputs.version }}'
          releaseBody: 'Release of version ${{ github.event.inputs.version }}'
          releaseDraft: false
          prerelease: false
